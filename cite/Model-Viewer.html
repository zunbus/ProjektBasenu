<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Model Viewer</title>
  <style>
    body { margin: 0; }
    model-viewer { width: 1000px; height: 1000px; }
  </style>
</head>
<body>

<model-viewer
  alt="Building"
  src="../assets/Building.glb"
  shadow-intensity="1"
  camera-controls
  touch-action="pan-y">
</model-viewer>

<script src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js"></script>

</body>
</html>
