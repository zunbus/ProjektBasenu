            model-viewer { 
                width: 1000px; 
                height: 1000px; 
                border-radius: 5%;

            button {
                background-color: green;
                border-radius: 25%;
                color: white;
                display: inline-block;
                height: 50px;
                width: 100px;
                border: 0 white solid;
            }
            button:hover{
                background-color: lightgreen;
            }
        </style>

    <body>
        <script src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js" type="module"></script>
        <div id="pudelko">
        <nav>
            <ul>   
                <li style="margin-top: 0;"><a href="#" onclick="closePage('index.html')"><img style="width: 50px; height: 50px;" src="../img/Logo.png" alt="logo"></a></li>

        <main>
            <div>
                <model-viewer
                src="../assets/Building.glb"
                camera-controls
                min-camera-orbit="auto 0m 0m"
                max-camera-orbit="auto 10m 10m"
                min-field-of-view="10deg"
                max-field-of-view="75deg"
                touch-action="pan-y"
                id="viewer">
                </model-viewer>
                <button onclick="Changemodel(0)">Budynek</button>
                <button onclick="Changemodel(1)">Parter</button>
                <button onclick="Changemodel(2)">Piwnica</button>
            </div>
        </main>
        <footer>
        </footer>


        <!-- Dać na każdą stronę i podstrone -->
        <div id="overlay1"></div>
        <div id="overlay2"></div>
        <div id="overlay3"></div>
        <script src="../scripts/common.js"></script>
        <!--                                 -->
        <script>
                const models = ["../assets/Building.glb", "../assets/Floor1.glb", "../assets/Basement.glb"];
                const viewer = document.getElementById("viewer");
                function Changemodel(id){
                    viewer.src = models[id];
                }
            </script>
